services:
  - type: web
    name: zerodha-mf-api
    runtime: python
    buildCommand: pip install -r requirements.txt && playwright install --with-deps chromium
    startCommand: uvicorn src.api.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHONPATH
        value: .
      - key: GOOGLE_API_KEY
        sync: false # Set this in Render dashboard
      - key: PORT
        value: 10000
